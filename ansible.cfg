# Ansible configuration for the OSINT control machine.
# Only non-default overrides are kept here; everything else uses Ansible's
# built-in defaults. Full reference:
# https://docs.ansible.com/ansible/latest/reference_appendices/config.html

[defaults]
# Targets are freshly-provisioned cloud instances with unknown host keys,
# so skip interactive host-key verification.
host_key_checking = False
